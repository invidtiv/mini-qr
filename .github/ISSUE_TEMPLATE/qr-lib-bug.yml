name: QR rendering bug
description: Report a regression with the QR code rendering engine — accents, scanning, exports, or visual glitches.
title: '[QR lib] '
labels: [bug, qr-lib, needs-triage]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! MiniQR's QR rendering engine was rewritten in v0.29 (see [CHANGELOG.md](https://github.com/lyqht/mini-qr/blob/main/CHANGELOG.md)). Have a question or suggestion instead? Open a [Discussion](https://github.com/lyqht/mini-qr/discussions) — this form is for reproducible bugs.

  - type: textarea
    id: what-you-did
    attributes:
      label: What were you doing?
      description: Walk us through the steps. Paste the exact data string if applicable — UTF-8, vCard, URL, etc.
      placeholder: |
        e.g. Typed "Xin chào, thế giới" into "Data to encode", then clicked "Download QR Code as SVG".
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      placeholder: e.g. The exported SVG should open in Photoshop with visible vector dots.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: What actually happened?
      description: Attach a screenshot of the rendered or exported QR if it looks wrong, or paste the decoded text if a scanner fails.
      placeholder: e.g. Photoshop opens a blank black image.
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser + OS
      placeholder: e.g. Chrome 148 on macOS 14.5
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: MiniQR version
      description: Shown in the v0.x.x button at the bottom of the page (desktop) or inside the hamburger menu (mobile).
      placeholder: e.g. v0.29.0

  - type: textarea
    id: anything-else
    attributes:
      label: Anything else?
      description: Other QR generators that handle this case correctly, related issues, console errors — whatever helps.
